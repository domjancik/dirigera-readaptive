dirigera:
  host: 192.168.1.249
  token_env: DIRIGERA_TOKEN
  # On Raspberry Pi, prefer a 0600 token file instead of an environment file:
  # token_file: /etc/dirigera-readaptive/token

# Recover every light whose DIRIGERA on behavior selects an adaptive profile.
watch_adaptive_on_lights: true
lights: []

poll_interval_seconds: 10
activation_cooldown_seconds: 30
recover_on_reconnect: true
recover_on_power_on: false

schedule_updates:
  latitude: 50.1
  longitude: 14.5
  timezone: Europe/Prague
  sample_minutes: 30
  profiles:
    - name: computed-standard
      profile_id: 7bbebe49-41a3-48ea-8f5f-9e33a36dad87
      output: /opt/dirigera-readaptive/schedules/computed.yaml
      curve:
        extend_day_after_late_sunset: true
    - name: computed-dimmed
      profile_id: 8439ba57-ac80-4905-86c5-2acee72d26c5
      output: /opt/dirigera-readaptive/schedules/computed-dim.yaml
      curve:
        extend_day_after_late_sunset: true
        min_light_level: 4
        morning_light_level: 70
        max_light_level: 85
        evening_light_level: 47
        pre_sleep_light_level: 42
